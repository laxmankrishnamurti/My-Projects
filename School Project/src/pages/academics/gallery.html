<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Student Life</title>
    <link rel="stylesheet" href="./gallery.css" />
  </head>
  <body>
    <section class="gallery-section">
      <div class="academics-gallery-wrapper">
        <!-- filter butttons  -->

        <div class="filterable-button-container">
          <button data-name="all" class="active">Show all</button>
          <button data-name="art">Art</button>
          <button data-name="dance">Dance</button>
          <button data-name="music">Music</button>
          <button data-name="sports">Sports</button>
        </div>

        <!-- Images container  -->

        <div class="filterables-cards">
          <div class="card" data-name="art"></div>
        </div>
      </div>
    </section>
  </body>
</html>
