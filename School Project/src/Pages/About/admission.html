<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./admission.css" />
  </head>
  <body>
    <section class="admission-section">
      <div class="about-admission-wrapper">
        <!-- Admission headlines  -->

        <div class="admission-headlines">
          <p class="online-heading">Online Admission</p>
          <button id="form-status-btn">Check Your Form Status</button>
        </div>

        <!-- Form Section starts here  -->

        <div class="form-container">
          <form action="#" class="form">
            <!-- Basic Info Section  -->

            <fieldset class="fieldset">
              <legend class="legend">
                Basic Info
                <span><i class="fa-solid fa-user-graduate"></i></span>
              </legend>

              <!-- Select Class  -->

              <div class="input-field">
                <label for="classname">Class </label>
                <select name="classname" id="classname" required>
                  <option value="Select">Select</option>
                  <option value="Nursary">Nursary</option>
                  <option value="L.KG">L.KG</option>
                  <option value="U.KG">U.KG</option>
                  <option value="I">I</option>
                  <option value="II">II</option>
                  <option value="III">III</option>
                  <option value="IV">IV</option>
                  <option value="V">V</option>
                  <option value="VI">VI</option>
                  <option value="VII">VII</option>
                  <option value="VIII">VIII</option>
                  <option value="IX">IX</option>
                  <option value="X">X</option>
                  <option value="XI">XI</option>
                </select>
              </div>
              <div class="input-field">
                <label for="fname">First Name</label>
                <input type="text" id="fname" required />
              </div>
              <div class="input-field">
                <label for="lname">Last Name</label>
                <input type="text" id="lname" required />
              </div>
              <div class="input-field">
                <label for="gender">Gender</label>
                <select name="gender" id="gender" required>
                  <option value="select">Select</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="input-field">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" required />
              </div>
              <div class="input-field">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" required />
              </div>
              <div class="input-field">
                <label for="email">Email</label>
                <input type="email" id="email" required />
              </div>
              <div class="input-field">
                <label for="blood">Blood Group</label>
                <select name="blood" id="blood" required>
                  <option value="select">Select</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                </select>
              </div>
              <div class="input-field">
                <label for="student-photo">Student Photo</label>
                <input type="file" id="student-photo" required />
              </div>
            </fieldset>
          </form>
        </div>
      </div>
    </section>
  </body>
  <script
    src="https://kit.fontawesome.com/d7a13f466d.js"
    crossorigin="anonymous"
  ></script>
</html>
